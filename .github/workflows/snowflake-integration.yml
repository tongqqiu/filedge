name: Snowflake Integration

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snowflake-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-caching: true

      - run: uv sync --extra dev --extra snowflake

      # Key-pair auth (preferred): materialize the PEM key from a secret, if set.
      # The secret check is done in the shell — the `secrets` context is not
      # allowed in a step `if:` condition.
      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          if [ -n "$SNOWFLAKE_PRIVATE_KEY" ]; then
            install -m 600 /dev/null "$RUNNER_TEMP/snowflake_key.p8"
            printf '%s' "$SNOWFLAKE_PRIVATE_KEY" > "$RUNNER_TEMP/snowflake_key.p8"
            echo "SNOWFLAKE_PRIVATE_KEY_PATH=$RUNNER_TEMP/snowflake_key.p8" >> "$GITHUB_ENV"
          fi

      - name: Test Snowflake connector
        env:
          FILEDGE_SNOWFLAKE_INTEGRATION: "1"
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: uv run pytest tests/test_connector_snowflake_integration.py
