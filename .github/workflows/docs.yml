name: Deploy versioned docs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Docs version to deploy, for example 0.1.2"
        required: true
      alias:
        description: "Alias to update"
        required: false
        default: latest

permissions:
  contents: write

concurrency:
  group: "docs"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs strictly
        run: uv run mkdocs build --strict

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve docs version
        id: docs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "alias=${{ inputs.alias }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy versioned docs
        run: |
          uv run mike deploy --push --update-aliases "${{ steps.docs.outputs.version }}" "${{ steps.docs.outputs.alias }}"
          uv run mike set-default --push "${{ steps.docs.outputs.alias }}"
