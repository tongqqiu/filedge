name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest --cov=filedge

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - run: uv publish

  github-release:
    needs: build  # independent of publish, so re-tagging a published version still releases
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract curated notes for this tag from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { flag = 1; next }
            /^## \[/ { flag = 0 }
            /^\[[^]]+\]: / { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $version" \
                 "(expected a '## [$version]' heading)."
            exit 1
          fi
          echo "----- release notes for $version -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md      # curated highlights, pre-pended...
          generate_release_notes: true     # ...above the auto-generated PR list
          files: dist/*
