name: Feature request
description: Propose an improvement or new capability for Filedge.
title: "Feature: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening a proposal. For anything that changes behavior, configuration, connectors, or architecture, please describe the use case first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is hard, unreliable, or unsupported today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest Filedge behavior change that would solve the problem.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Audit DB / state machine
        - Schema inference or validation
        - Connector
        - Authoring UI
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: connector
    attributes:
      label: Connector, if relevant
      options:
        - Not connector-specific
        - SQLite
        - PostgreSQL
        - BigQuery
        - Databricks
        - Snowflake
        - DuckDB
        - New connector
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround, adjacent tool, or different design you considered.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Call out config changes, migration needs, or possible impact on existing pipelines.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues.
          required: true
        - label: I am willing to help test or review this change.
          required: false
