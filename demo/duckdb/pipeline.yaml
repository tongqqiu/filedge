format: csv
dest_table: orders
write_mode: append
retry_cap: 1

connector:
  type: duckdb
  path: ./demo/duckdb/out/warehouse.duckdb

columns:
  - source: order_id
    dest: order_id
    type: string
    required: true
  - source: customer_id
    dest: customer_id
    type: string
    required: true
  - source: order_date
    dest: order_date
    type: date
    required: true
  - source: amount
    dest: amount
    type: float
    required: true
  - source: currency
    dest: currency
    type: string
    required: true
  - source: status
    dest: status
    type: string
    required: true
