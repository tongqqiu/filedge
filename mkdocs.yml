site_name: Filedge
site_description: Reliable file ingestion toolkit — atomic commits, content-based idempotency, full audit trail
site_url: https://tongqqiu.github.io/filedge/
repo_url: https://github.com/tongqqiu/filedge
repo_name: tongqqiu/filedge

extra:
  version:
    provider: mike
    default: latest
    alias: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Author a pipeline: guides/author.md
    - Inspect a file: guides/inspect.md
    - Preview a file: guides/preview.md
    - Validate a file: guides/validate.md
    - Compact small files: guides/compact.md
    - Run a pipeline: guides/run.md
    - Scale ingestion: guides/scale.md
    - Healthcheck: guides/healthcheck.md
    - Crash-retry demo: guides/crash-retry.md
    - Requeue failed files: guides/requeue.md
    - Audit Export: guides/audit-export.md
    - CDC files: guides/cdc-files.md
    - API sources: guides/api-sources.md
    - API Source adapters: guides/api-source-adapters.md
    - Queue sources: guides/queue-sources.md
    - Source manifests: guides/source-manifests.md
  - Reference:
    - pipeline.yaml: reference/pipeline-yaml.md
    - CLI commands: reference/cli.md
    - Connectors: reference/connectors.md
    - Column types: reference/column-types.md
  - Architecture:
    - How it works: architecture/index.md
    - Design decisions: architecture/decisions.md
  - Release checklist: release-checklist.md
