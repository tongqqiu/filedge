site_name: Filedge
site_description: Reliable file ingestion toolkit — atomic commits, content-based idempotency, full audit trail
site_url: https://tongqqiu.github.io/filedge/
repo_url: https://github.com/tongqqiu/filedge
repo_name: tongqqiu/filedge

extra:
  version:
    provider: mike
    default: latest
    alias: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - Tutorials: tutorials/index.md
    - Stripe API to DuckDB: guides/stripe-duckdb-demo.md
    - EDGAR API to SQLite: guides/edgar-demo.md
    - Crash-safe retry: guides/crash-retry.md
  - How-to guides:
    - How-to guides: guides/index.md
    - Build a pipeline:
      - Author a pipeline: guides/author.md
      - Inspect a file: guides/inspect.md
      - Preview a file: guides/preview.md
      - Validate a file: guides/validate.md
    - Run & operate:
      - Run a pipeline: guides/run.md
      - Scale ingestion: guides/scale.md
      - Compact small files: guides/compact.md
      - Requeue failed files: guides/requeue.md
      - Quarantine bad rows: guides/quarantine.md
      - Healthcheck: guides/healthcheck.md
      - Observability: guides/observability.md
      - Deploy Filedge: guides/deploy.md
      - Export an audit site: guides/audit-export.md
    - Connect sources:
      - API sources: guides/api-sources.md
      - API Source adapters: guides/api-source-adapters.md
      - Queue sources: guides/queue-sources.md
      - Source manifests: guides/source-manifests.md
      - CDC files: guides/cdc-files.md
    - File formats:
      - Overview: guides/file-formats.md
      - Fixed-width files: guides/fixed-width.md
  - Reference:
    - pipeline.yaml: reference/pipeline-yaml.md
    - CLI commands: reference/cli.md
    - Connectors: reference/connectors.md
    - Column types: reference/column-types.md
  - Architecture:
    - How it works: architecture/index.md
    - Design decisions: architecture/decisions.md
