# Example Sources Config for the Reference Fetcher (filedge-fetch).
#
# The Reference Fetcher is an external companion to `filedge run` (ADR-0018):
# it pulls an API Source and lands complete NDJSON Files — each with an
# OpenLineage-shaped Source Manifest sidecar — in the Watched Directory. Then
# `filedge run --dir ./landing --config pipeline.yaml ...` ingests them.
#
# This example targets the public GitHub REST API, which needs no credentials
# (it is rate-limited unauthenticated). Run it with:
#
#   filedge-fetch --config examples/sources.yaml --source github-commits
#
# Credentials, when an API needs them, are named by environment variable only —
# never written here.

version: 1

sources:
  - name: github-commits
    type: github
    # The full endpoint URL. Records must come back as a JSON array.
    url: https://api.github.com/repos/tongqqiu/filedge/commits

    # Where the Fetcher works. Staged Files are written under staging_dir,
    # then promoted into watched_directory; the cursor lives under state_dir.
    staging_dir: ./staging
    watched_directory: ./landing
    state_dir: ./state

    # Incremental cursor: `param` is the query parameter that carries the
    # high-water mark; `field` is the dotted path in each record the next
    # cursor is read from (the largest value seen becomes the next run's mark).
    cursor:
      param: since
      field: commit.committer.date

    # Optional static query parameters added to every request.
    query:
      sha: main

    # Optional: read a bearer token from this environment variable to raise
    # the GitHub rate limit. Omit entirely to run unauthenticated.
    # credential_env: GITHUB_TOKEN

    page_size: 100
    gzip: false

  # EDGAR companyConcept source. SEC requires a descriptive User-Agent with
  # contact info; no API key or secret is involved.
  # Run it with:
  #   filedge-fetch --config examples/sources.yaml --source edgar-apple-revenues
  - name: edgar-apple-revenues
    type: edgar
    cik: 320193                   # Apple Inc.; the loader pads to CIK0000320193
    taxonomy: us-gaap             # default when omitted
    concept: Revenues
    unit: USD
    user_agent: "Filedge Example contact@example.com"
    staging_dir: ./staging
    watched_directory: ./landing
    state_dir: ./state
    cursor:
      field: filed                # client-side high-water mark in each fact
    gzip: false

  # A Kafka Queue Source for the Reference Queue Materializer (filedge-materialize).
  # Run it with:
  #   filedge-materialize --config examples/sources.yaml --source orders
  # (Needs a reachable Kafka broker and the `kafka` extra: pip install filedge[kafka].)
  - name: orders
    type: kafka
    brokers: [localhost:9092]      # or a comma-separated string
    topic: orders
    consumer_group: filedge-orders
    staging_dir: ./staging
    watched_directory: ./landing
    state_dir: ./state
    batch_size: 1000               # count boundary
    batch_timeout_seconds: 30      # time boundary (whichever fires first)
    trigger: drain                 # or: continuous
    format: json
    gzip: false
    # Plain security settings + env-resolved credentials (never inline secrets):
    # security_protocol: SASL_SSL
    # sasl_mechanism: PLAIN
    # credentials:
    #   sasl_username: env:KAFKA_USER
    #   sasl_password: env:KAFKA_PASSWORD
